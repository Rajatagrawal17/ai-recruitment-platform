services:
  # Backend Service
  - type: web
    name: ai-recruitment-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        scope: run
        sync: false
      - key: JWT_SECRET
        scope: run
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    healthCheckPath: /api/health
    healthCheckDomain: localhost
    preDeployCommand: cd backend && npm install

  # Frontend Service
  - type: web
    name: ai-recruitment-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s build -l 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        scope: run
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    preDeployCommand: cd frontend && npm install
