services:
  # Backend Service
  - type: web
    name: ai-recruitment-backend
    env: node
    plan: free
    buildCommand: cd backend && npm ci --no-optional --prefer-offline --omit=dev
    startCommand: cd backend && npm start
    envVars:
      - key: MONGO_URI
        scope: run
        sync: false
      - key: JWT_SECRET
        scope: run
        sync: false
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Service
  - type: web
    name: ai-recruitment-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm ci --no-optional --prefer-offline --omit=dev && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: REACT_APP_API_URL
        scope: run
        sync: false
      - key: NODE_ENV
        value: production
