name: Release Gate

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run integration checks
        working-directory: backend
        env:
          INTEGRATION_BASE_URL: ${{ secrets.INTEGRATION_BASE_URL || 'https://cognifit-backend.onrender.com/api' }}
          INTEGRATION_CANDIDATE_EMAIL: ${{ secrets.INTEGRATION_CANDIDATE_EMAIL }}
          INTEGRATION_CANDIDATE_PASSWORD: ${{ secrets.INTEGRATION_CANDIDATE_PASSWORD }}
          INTEGRATION_RECRUITER_EMAIL: ${{ secrets.INTEGRATION_RECRUITER_EMAIL }}
          INTEGRATION_RECRUITER_PASSWORD: ${{ secrets.INTEGRATION_RECRUITER_PASSWORD }}
        run: npm run test:integration

  release-gate-summary:
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-integration]
    if: success()

    steps:
      - name: Gate Passed
        run: echo "Release gate passed: frontend build and backend integration checks are green."
