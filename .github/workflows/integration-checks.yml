name: Integration Checks

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run integration checks
        working-directory: backend
        env:
          INTEGRATION_BASE_URL: ${{ secrets.INTEGRATION_BASE_URL || 'https://cognifit-backend.onrender.com/api' }}
          INTEGRATION_CANDIDATE_EMAIL: ${{ secrets.INTEGRATION_CANDIDATE_EMAIL }}
          INTEGRATION_CANDIDATE_PASSWORD: ${{ secrets.INTEGRATION_CANDIDATE_PASSWORD }}
          INTEGRATION_RECRUITER_EMAIL: ${{ secrets.INTEGRATION_RECRUITER_EMAIL }}
          INTEGRATION_RECRUITER_PASSWORD: ${{ secrets.INTEGRATION_RECRUITER_PASSWORD }}
        run: npm run test:integration
